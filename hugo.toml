baseURL = "https://terrygzhou.github.io/"
languageCode = "en-us"
title = "Terry Zhou"
theme = "PaperMod"

[pagination]
  pageSize = 10

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  env = "production"
  FormatDate = "2006-01-02"

  [params.author]
    name = "Terry Zhou"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/terrygzhou"

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    title = "Terry Zhou"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
